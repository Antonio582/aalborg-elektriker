<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#064e3b"/>
  <!-- Charging station body -->
  <rect x="160" y="50" width="80" height="180" rx="10" fill="#065f46" stroke="#10b981" stroke-width="2"/>
  <!-- Screen -->
  <rect x="175" y="70" width="50" height="35" rx="4" fill="#022c22"/>
  <rect x="180" y="75" width="40" height="25" rx="2" fill="#10b981" opacity="0.3"/>
  <!-- Charging indicator -->
  <circle cx="200" cy="130" r="15" fill="#022c22" stroke="#34d399" stroke-width="2"/>
  <!-- Lightning in circle -->
  <path d="M197 122 L193 131 L199 131 L195 140 L207 128 L200 128 L205 122Z" fill="#34d399"/>
  <!-- Cable -->
  <path d="M200 165 Q200 200 230 210 Q270 225 270 250" stroke="#10b981" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Plug end -->
  <circle cx="270" cy="255" r="10" fill="#065f46" stroke="#34d399" stroke-width="2"/>
  <!-- Car silhouette -->
  <path d="M60 240 Q70 210 110 210 L150 210 Q165 210 170 225 L170 250 L50 250 Q50 240 60 240Z" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1"/>
  <circle cx="80" cy="255" r="10" fill="#022c22" stroke="#34d399" stroke-width="1.5"/>
  <circle cx="150" cy="255" r="10" fill="#022c22" stroke="#34d399" stroke-width="1.5"/>
  <!-- Stand base -->
  <rect x="180" y="230" width="40" height="6" rx="3" fill="#10b981" opacity="0.5"/>
  <text x="200" y="285" text-anchor="middle" fill="#a7f3d0" font-family="sans-serif" font-size="12" opacity="0.5">Ladestander</text>
</svg>
