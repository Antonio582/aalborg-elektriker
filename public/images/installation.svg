<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#064e3b"/>
  <!-- Outlet / socket -->
  <rect x="140" y="60" width="120" height="160" rx="16" fill="#065f46" stroke="#10b981" stroke-width="2"/>
  <!-- Socket holes -->
  <circle cx="175" cy="120" r="8" fill="#022c22" stroke="#34d399" stroke-width="1.5"/>
  <circle cx="225" cy="120" r="8" fill="#022c22" stroke="#34d399" stroke-width="1.5"/>
  <!-- Ground pin -->
  <rect x="192" y="155" width="16" height="4" rx="2" fill="#34d399"/>
  <!-- Wires -->
  <path d="M175 220 L175 260 Q175 270 185 270 L300 270" stroke="#10b981" stroke-width="2" fill="none"/>
  <path d="M225 220 L225 245 Q225 255 235 255 L300 255" stroke="#34d399" stroke-width="2" fill="none"/>
  <!-- Screwdriver -->
  <line x1="310" y1="60" x2="340" y2="200" stroke="#6ee7b7" stroke-width="3" stroke-linecap="round"/>
  <rect x="332" y="190" width="16" height="50" rx="4" fill="#10b981" transform="rotate(10 340 215)"/>
  <text x="200" y="290" text-anchor="middle" fill="#a7f3d0" font-family="sans-serif" font-size="12" opacity="0.5">El-installation</text>
</svg>
