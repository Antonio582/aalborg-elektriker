<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#064e3b"/>
  <!-- Light bulb -->
  <circle cx="200" cy="120" r="55" fill="#022c22" stroke="#10b981" stroke-width="2"/>
  <!-- Filament glow -->
  <circle cx="200" cy="120" r="35" fill="#34d399" opacity="0.15"/>
  <circle cx="200" cy="120" r="20" fill="#6ee7b7" opacity="0.2"/>
  <!-- Filament -->
  <path d="M185 105 Q190 130 200 110 Q210 90 215 115 Q220 140 225 110" stroke="#34d399" stroke-width="2" fill="none"/>
  <!-- Base -->
  <rect x="185" y="175" width="30" height="8" rx="2" fill="#10b981"/>
  <rect x="188" y="183" width="24" height="6" rx="2" fill="#059669"/>
  <rect x="191" y="189" width="18" height="6" rx="2" fill="#047857"/>
  <!-- Light rays -->
  <line x1="200" y1="35" x2="200" y2="50" stroke="#34d399" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="135" y1="60" x2="145" y2="72" stroke="#34d399" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="265" y1="60" x2="255" y2="72" stroke="#34d399" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="115" y1="120" x2="130" y2="120" stroke="#34d399" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="270" y1="120" x2="285" y2="120" stroke="#34d399" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Decorative spots -->
  <circle cx="100" cy="230" r="12" fill="#10b981" opacity="0.15"/>
  <circle cx="300" cy="240" r="16" fill="#34d399" opacity="0.1"/>
  <circle cx="340" cy="80" r="10" fill="#6ee7b7" opacity="0.1"/>
  <text x="200" y="280" text-anchor="middle" fill="#a7f3d0" font-family="sans-serif" font-size="12" opacity="0.5">Belysning</text>
</svg>
